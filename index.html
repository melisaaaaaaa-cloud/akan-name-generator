<body>

    <div class="container">
        <h1>Akan Name Generator</h1>
        <p>Find your Akan name based on your birthday and gender.</p>
       
        < id="akanform">
            <label>Day:</label>
            <input type="number" id="day" required>

            <label>Month:</label>
            <input type="number" id="month" required>

            <label>Year</label>
            <input type="number" id="year" required>

            <label>Gender</label>
            <select id="gender" required>
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>

            <button type="Submit">Generate Name</button>
        </form>
        <h2 id="result"></h2>
    </div>
